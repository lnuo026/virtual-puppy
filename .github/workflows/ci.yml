name: CI

on:
    push:
      branches: [main]
    pull_request:
      branches: [main]
    workflow_dispatch:

jobs:
    build-and-test-backend:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '24'

        - name: Install dependencies
          working-directory: app/backend
          run: npm ci

        - name: Run lint
          working-directory: app/backend
          run: npm run lint

        - name: Run unit tests
          working-directory: app/backend
          run: npm run test

        - name: Build
          working-directory: app/backend
          run: npm run build

    build-and-test-frontend:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '24'

        - name: Install dependencies
          working-directory: app/frontend
          run: npm ci

        - name: Run lint
          working-directory: app/frontend
          run: npm run lint

        - name: Build
          working-directory: app/frontend
          run: npm run build